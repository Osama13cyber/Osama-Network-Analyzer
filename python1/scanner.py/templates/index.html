<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #05080a; color: #00f2ff; font-family: 'Courier New', monospace; }
        .box { border: 1px solid #00f2ff; background: #0a0f14; padding: 25px; margin-top: 30px; box-shadow: 0 0 20px #00f2ff33; }
        .table { color: #00f2ff; }
        .btn-osama { border: 1px solid #00f2ff; color: #00f2ff; background: none; border-radius: 0; }
        .btn-osama:hover { background: #00f2ff; color: black; }
        .risk-high { color: #ff4444; text-shadow: 0 0 5px red; }
    </style>
</head>
<body>
    <div class="container box">
        <div class="d-flex justify-content-between border-bottom pb-3 mb-4">
            <h2>{{ name }}</h2>
            <div>
                <button onclick="doScan()" class="btn btn-osama">RUN SCAN</button>
            </div>
        </div>
        <table class="table">
            <thead>
                <tr><th>IP ADDRESS</th><th>MAC & VENDOR</th><th>SERVICES</th><th>RISK</th></tr>
            </thead>
            <tbody id="out"></tbody>
        </table>
    </div>
    <script>
        async function doScan() {
            const out = document.getElementById('out');
            out.innerHTML = '<tr><td colspan="4">Analyzing Network...</td></tr>';
            const res = await fetch('/scan');
            const data = await res.json();
            out.innerHTML = '';
            data.forEach(d => {
                out.innerHTML += `<tr>
                    <td>${d.ip}</td>
                    <td>${d.mac}<br><small>${d.vendor}</small></td>
                    <td>${d.services}</td>
                    <td class="${d.risk == 'HIGH RISK' ? 'risk-high' : ''}">${d.risk}</td>
                </tr>`;
            });
        }
    </script>
</body>
</html>
